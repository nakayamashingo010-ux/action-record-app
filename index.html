<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>行動記録</title>

<!-- カレンダー -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>

<style>
* {
    box-sizing: border-box;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    padding: 14px;
    max-width: 480px;
    margin: 0 auto;
    background: #f5f5f5;
    color: #1a1a1a;
}

h2 {
    text-align: center;
    font-size: 24px;
    margin: 10px 0 18px;
}

h3 {
    font-size: 19px;
    margin: 20px 0 8px;
}

label {
    display: block;
    font-size: 15px;
    color: #555;
    margin: 2px 2px 0;
}

input, button {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input::placeholder {
    color: #888;
}

button {
    background: #4a90d9;
    color: white;
    border: none;
    font-weight: bold;
    -webkit-tap-highlight-color: transparent;
}

button:active {
    background: #3a78b5;
}

.person {
    background: white;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
}

.person-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.person-head label {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
    color: #333;
}

.remove-btn {
    width: auto !important;
    padding: 6px 12px !important;
    margin: 0 !important;
    font-size: 13px !important;
    background: #f0f0f0 !important;
    color: #c44848 !important;
    border: 1px solid #ddd !important;
    font-weight: normal !important;
}

.remove-btn:active {
    background: #e5e5e5 !important;
}

.secondary-btn {
    background: white;
    color: #4a90d9;
    border: 2px solid #4a90d9 !important;
    font-weight: bold;
}

.secondary-btn:active {
    background: #eaf2fb;
}

.secondary-btn:disabled {
    background: #f0f0f0;
    color: #999;
    border-color: #ccc !important;
}

.autocomplete-wrap {
    position: relative;
    margin: 6px 0;
}

.autocomplete-wrap input {
    margin: 0;
}

.autocomplete-list {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid #ccc;
    border-top: none;
    border-radius: 0 0 8px 8px;
    max-height: 220px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: 0 6px 12px rgba(0,0,0,0.12);
}

.autocomplete-list.show {
    display: block;
}

.autocomplete-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 4px 14px;
    border-bottom: 1px solid #f0f0f0;
    -webkit-tap-highlight-color: transparent;
}

.autocomplete-item:last-child {
    border-bottom: none;
}

.autocomplete-item:active {
    background: #eaf2fb;
}

.autocomplete-text {
    flex: 1;
    padding: 12px 0;
    font-size: 16px;
}

.autocomplete-delete {
    width: auto !important;
    flex-shrink: 0;
    margin: 0 !important;
    padding: 8px 12px !important;
    font-size: 13px !important;
    background: transparent !important;
    color: #c44848 !important;
    border: none !important;
    font-weight: normal !important;
}

.autocomplete-delete:active {
    background: #fbeaea !important;
    border-radius: 6px;
}

.person input {
    margin: 6px 0;
}

.row {
    display: flex;
    gap: 8px;
}

.row input {
    flex: 1;
    min-width: 0;
}

.card {
    background: white;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    font-size: 17px;
    line-height: 1.7;
}

.card button {
    width: auto;
    padding: 8px 16px;
    font-size: 15px;
    margin-top: 8px;
    background: #e05c5c;
}

.card button:active {
    background: #c44848;
}

/* カレンダー：記録がある日をわかりやすく表示 */
/* スタイルはJSから直接適用（iOS SafariのCSS優先度問題を回避） */
.flatpickr-day.has-data {
    font-weight: 700 !important;
    color: #1a1a1a !important;
    box-shadow: inset 0 -4px 0 0 #4a90d9 !important;
}

.flatpickr-day.has-data.selected,
.flatpickr-day.has-data.startRange,
.flatpickr-day.has-data.endRange {
    box-shadow: inset 0 -4px 0 0 rgba(255,255,255,0.7) !important;
    font-weight: 700 !important;
}

.flatpickr-day.has-data.today:not(.selected) {
    box-shadow: inset 0 -4px 0 0 #4a90d9 !important;
}

/* flatpickr 自体の文字も少し大きく */
.flatpickr-calendar {
    font-size: 16px !important;
    width: 100% !important;
    max-width: 480px;
}

.flatpickr-day {
    line-height: 44px !important;
    height: 44px !important;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>

<h2>行動記録</h2>

<label for="inputter">入力者名（あなたの名前）</label>
<input id="inputter" placeholder="例: 田中">

<label for="date">日付</label>
<input id="date" placeholder="日付を選択">

<h3>人物（最大10人）</h3>
<div id="people"></div>
<button type="button" id="addPersonBtn" class="secondary-btn" onclick="addPersonRow()">＋ 人を追加</button>

<h3>行き先</h3>
<div class="autocomplete-wrap">
    <input id="place" placeholder="行き先を入力">
    <div class="autocomplete-list"></div>
</div>

<button onclick="add()">記録</button>

<h3>エクセル保存</h3>
<button onclick="exportXlsx()">全期間をエクセル保存</button>

<label for="csvMonth">月を選んで保存</label>
<input type="month" id="csvMonth">
<button type="button" class="secondary-btn" onclick="exportXlsxByMonth()">選んだ月だけエクセル保存</button>

<h3>一覧</h3>
<div id="list"></div>

<script>

// DB
let db;
let selectedDates = [];

// 入力者名（この端末に保存、全員共通のCSVに合わせる用）
const inputterInput = document.getElementById("inputter");
inputterInput.value = localStorage.getItem("inputterName") || "";
inputterInput.addEventListener("input", () => {
    localStorage.setItem("inputterName", inputterInput.value);
});

// CSV月別出力の月選択欄も、現在の月をデフォルトにしておく
const csvMonthInput = document.getElementById("csvMonth");
{
    const now = new Date();
    csvMonthInput.value = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0");
}

let req = indexedDB.open("tripDB", 1);

req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
};

req.onsuccess = e => {
    db = e.target.result;

    // ページを開いたら日付欄を当日にしておく
    fp.setDate(getTodayStr(), true);

    load();
};

// 当日の日付を「Y-m-d」のローカル時間で取得（タイムゾーンずれ防止）
function getTodayStr() {
    const d = new Date();
    return d.getFullYear() + "-" +
        String(d.getMonth() + 1).padStart(2, '0') + "-" +
        String(d.getDate()).padStart(2, '0');
}

// カレンダー初期化
const fp = flatpickr("#date", {
    dateFormat: "Y-m-d",
    onDayCreate: function(dObj, dStr, fp, dayElem) {
        if (!dayElem.dateObj) return;
        let d = dayElem.dateObj;
        let dateStr = d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, '0') + "-" +
            String(d.getDate()).padStart(2, '0');

        dayElem.dataset.date = dateStr;

        if (selectedDates.includes(dateStr)) {
            applyDayMarker(dayElem);
        }
    },
    // ✅ カレンダーを開くたびに必ずマーカーを付け直す（これが一番確実）
    onOpen: function() {
        setTimeout(refreshDayMarkers, 0);
    },
    onChange: function() {
        renderList();
    },
    onMonthChange: function() {
        setTimeout(refreshDayMarkers, 0);
    }
});

function applyDayMarker(dayElem) {
    dayElem.classList.add("has-data");
    dayElem.style.fontWeight = "700";
    dayElem.style.boxShadow = "inset 0 -4px 0 0 #4a90d9";
}

function refreshDayMarkers() {
    document.querySelectorAll(".flatpickr-day[data-date]").forEach(dayElem => {
        if (selectedDates.includes(dayElem.dataset.date)) {
            applyDayMarker(dayElem);
        } else {
            dayElem.classList.remove("has-data");
            dayElem.style.fontWeight = "";
            dayElem.style.boxShadow = "";
        }
    });
}

// 人物入力（最初は1人、ボタンで追加／削除）
const peopleDiv = document.getElementById("people");
const addPersonBtn = document.getElementById("addPersonBtn");
const MAX_PEOPLE = 10;
let personSeq = 0;

function createPersonRow() {
    personSeq++;
    const pid = personSeq;

    const div = document.createElement("div");
    div.className = "person";
    div.dataset.pid = pid;
    div.innerHTML = `
        <div class="person-head">
            <label></label>
            <button type="button" class="remove-btn" onclick="removePersonRow(${pid})">✕ 削除</button>
        </div>
        <div class="autocomplete-wrap">
            <input class="p-name" placeholder="名前">
            <div class="autocomplete-list"></div>
        </div>
        <div class="row">
            <div style="flex:1">
                <label>人数</label>
                <input class="p-count" type="number" value="1">
            </div>
            <div style="flex:1">
                <label>区分</label>
                <input class="p-kubun" placeholder="区分">
            </div>
        </div>`;

    peopleDiv.appendChild(div);
    attachAutocomplete(div.querySelector(".p-name"), () => nameSuggestions, (value) => {
        hiddenNames.add(value);
        saveHiddenSet(HIDDEN_NAMES_KEY, hiddenNames);
        nameSuggestions = nameSuggestions.filter(v => v !== value);
    });
    renumberPeople();
    updateAddButtonState();
}

function addPersonRow() {
    if (peopleDiv.children.length >= MAX_PEOPLE) return;
    createPersonRow();
}

function removePersonRow(pid) {
    const el = peopleDiv.querySelector(`[data-pid="${pid}"]`);
    if (el) el.remove();
    renumberPeople();
    updateAddButtonState();
}

function renumberPeople() {
    [...peopleDiv.children].forEach((div, idx) => {
        div.querySelector(".person-head label").textContent = `${idx + 1}人目`;
    });
}

function updateAddButtonState() {
    if (peopleDiv.children.length >= MAX_PEOPLE) {
        addPersonBtn.disabled = true;
        addPersonBtn.textContent = "上限（10人）に達しました";
    } else {
        addPersonBtn.disabled = false;
        addPersonBtn.textContent = "＋ 人を追加";
    }
}

// 最初は1人分だけ表示
createPersonRow();

// 追加
function add() {
    let place = document.getElementById("place").value;
    let date = document.getElementById("date").value;
    let inputter = inputterInput.value;

    unhideSuggestion(place, hiddenPlaces, HIDDEN_PLACES_KEY);

    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");

    document.querySelectorAll(".person").forEach(div => {
        let name = div.querySelector(".p-name").value;
        if (!name) return;

        unhideSuggestion(name, hiddenNames, HIDDEN_NAMES_KEY);

        let count = div.querySelector(".p-count").value || 1;
        let kubun = div.querySelector(".p-kubun").value || "その他";

        store.add({ date, name, count, kubun, place, inputter });
    });

    // ✅ トランザクションが完全に完了してからloadする（書き込み前にloadしてしまうバグを修正）
    tx.oncomplete = () => load();
}

// 表示＋カレンダー更新
let allRecords = [];

function load() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");

    let req = store.getAll();

    req.onsuccess = () => {
        let data = req.result;

        // ✅ 日付一覧更新
        selectedDates = [];
        data.forEach(r => {
            if (!selectedDates.includes(r.date)) {
                selectedDates.push(r.date);
            }
        });

        fp.redraw(); // 月移動時のonDayCreate用（バージョン固定済みなので安全）
        setTimeout(refreshDayMarkers, 0); // ✅ DOM確定後にマーカーを付け直す

        allRecords = data.reverse(); // 新しい記録が先頭
        renderList();
        updateSuggestions(data);
    };
}

// 過去に入力した名前・行き先を候補として保持（削除した候補は除外）
let nameSuggestions = [];
let placeSuggestions = [];

const HIDDEN_NAMES_KEY = "hiddenNameSuggestions";
const HIDDEN_PLACES_KEY = "hiddenPlaceSuggestions";

function loadHiddenSet(key) {
    try {
        return new Set(JSON.parse(localStorage.getItem(key) || "[]"));
    } catch {
        return new Set();
    }
}

function saveHiddenSet(key, set) {
    localStorage.setItem(key, JSON.stringify([...set]));
}

let hiddenNames = loadHiddenSet(HIDDEN_NAMES_KEY);
let hiddenPlaces = loadHiddenSet(HIDDEN_PLACES_KEY);

// 候補から削除した値も、新しい記録で再び使われたら候補に復活させる
function unhideSuggestion(value, hiddenSet, key) {
    if (value && hiddenSet.has(value)) {
        hiddenSet.delete(value);
        saveHiddenSet(key, hiddenSet);
    }
}

function updateSuggestions(data) {
    nameSuggestions = [...new Set(data.map(r => r.name).filter(Boolean))]
        .filter(v => !hiddenNames.has(v))
        .sort((a, b) => a.localeCompare(b, "ja"));
    placeSuggestions = [...new Set(data.map(r => r.place).filter(Boolean))]
        .filter(v => !hiddenPlaces.has(v))
        .sort((a, b) => a.localeCompare(b, "ja"));
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

// タップで開く候補一覧（名前・行き先で共通利用）
// onRemove(value) が渡された場合、各候補に削除ボタンが付く
function attachAutocomplete(input, getList, onRemove) {
    const wrap = input.closest(".autocomplete-wrap");
    const list = wrap.querySelector(".autocomplete-list");
    let lastFilter = "";

    function render(filter) {
        lastFilter = filter;
        let items = getList().filter(v => v.toLowerCase().includes(filter.toLowerCase()));

        if (items.length === 0) {
            list.classList.remove("show");
            list.innerHTML = "";
            return;
        }

        list.innerHTML = items.map(v => `
            <div class="autocomplete-item" data-value="${escapeHtml(v)}">
                <span class="autocomplete-text">${escapeHtml(v)}</span>
                ${onRemove ? `<button type="button" class="autocomplete-delete">✕</button>` : ""}
            </div>`).join("");
        list.classList.add("show");
    }

    // タップ（フォーカス）した時点で全候補を表示
    input.addEventListener("focus", () => render(""));
    // 入力中は絞り込み
    input.addEventListener("input", () => render(input.value));
    // 入力欄からフォーカスが外れたら閉じる（候補タップを拾えるよう少し遅延）
    input.addEventListener("blur", () => {
        setTimeout(() => list.classList.remove("show"), 150);
    });

    // 候補タップ時に先に入力欄のフォーカスが外れないようにする
    list.addEventListener("pointerdown", e => e.preventDefault());

    list.addEventListener("click", e => {
        const item = e.target.closest(".autocomplete-item");
        if (!item) return;
        const value = item.dataset.value;

        // ✕ボタンなら候補から削除するだけ（入力はしない）
        if (e.target.closest(".autocomplete-delete")) {
            if (onRemove) onRemove(value);
            render(lastFilter);
            return;
        }

        input.value = value;
        list.classList.remove("show");
    });
}

// 行き先欄に候補機能を設定（削除ボタン付き）
attachAutocomplete(document.getElementById("place"), () => placeSuggestions, (value) => {
    hiddenPlaces.add(value);
    saveHiddenSet(HIDDEN_PLACES_KEY, hiddenPlaces);
    placeSuggestions = placeSuggestions.filter(v => v !== value);
});

// 一覧を「選択している日付」だけ絞り込んで描画
function renderList() {
    let list = document.getElementById("list");
    let dateValue = document.getElementById("date").value;

    if (!dateValue) {
        list.innerHTML = `<p style="text-align:center;color:#888;">日付を選択すると、その日の記録が表示されます</p>`;
        return;
    }

    let filtered = allRecords.filter(r => r.date === dateValue);

    if (filtered.length === 0) {
        list.innerHTML = `<p style="text-align:center;color:#888;">${escapeHtml(dateValue)} の記録はまだありません</p>`;
        return;
    }

    let html = `<p style="color:#555;font-size:14px;margin:0 0 8px;">${escapeHtml(dateValue)} の記録（${filtered.length}件）</p>`;

    filtered.forEach(r => {
        html += `
        <div class="card">
            ${r.name}（${r.count}人 / ${r.kubun}）<br>
            → ${r.place}<br>
            ${r.inputter ? `<span style="color:#999;font-size:13px;">入力者: ${escapeHtml(r.inputter)}</span><br>` : ""}
            <button onclick="del(${r.id})">削除</button>
        </div>`;
    });

    list.innerHTML = html;
}

// 削除
function del(id) {
    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");
    store.delete(id);
    load();
}

// 記録の配列からExcelファイルを作ってダウンロード
function downloadXlsx(data, filename) {
    // ヘッダー付きの行データを作る
    let rows = [["date", "name", "count", "kubun", "place", "inputter"]];
    data.forEach(r => {
        rows.push([r.date || "", r.name || "", Number(r.count) || 1, r.kubun || "", r.place || "", r.inputter || ""]);
    });

    let ws = XLSX.utils.aoa_to_sheet(rows);

    // 列幅を整える
    ws["!cols"] = [
        { wch: 12 }, // 日付
        { wch: 14 }, // 名前
        { wch: 6  }, // 人数
        { wch: 10 }, // 区分
        { wch: 20 }, // 行き先
        { wch: 12 }, // 入力者
    ];

    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "記録");

    XLSX.writeFile(wb, filename);
}

// エクセル保存（全期間）
function exportXlsx() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");
    let req = store.getAll();

    req.onsuccess = () => {
        downloadXlsx(req.result, "行動記録_全期間.xlsx");
    };
}

// エクセル保存（選んだ月だけ）
function exportXlsxByMonth() {
    let monthValue = csvMonthInput.value; // "YYYY-MM"

    if (!monthValue) {
        alert("保存する月を選んでください");
        return;
    }

    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");
    let req = store.getAll();

    req.onsuccess = () => {
        let filtered = req.result.filter(r => r.date && r.date.startsWith(monthValue));

        if (filtered.length === 0) {
            alert(`${monthValue} の記録はありません`);
            return;
        }

        downloadXlsx(filtered, `行動記録_${monthValue}.xlsx`);
    };
}

</script>

</body>
</html>
