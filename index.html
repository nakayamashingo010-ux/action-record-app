<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>行動記録</title>

<!-- カレンダー -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
* {
    box-sizing: border-box;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    padding: 14px;
    max-width: 480px;
    margin: 0 auto;
    background: #f5f5f5;
    color: #1a1a1a;
}

h2 {
    text-align: center;
    font-size: 24px;
    margin: 10px 0 18px;
}

h3 {
    font-size: 19px;
    margin: 20px 0 8px;
}

label {
    display: block;
    font-size: 15px;
    color: #555;
    margin: 2px 2px 0;
}

input, button {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input::placeholder {
    color: #888;
}

button {
    background: #4a90d9;
    color: white;
    border: none;
    font-weight: bold;
    -webkit-tap-highlight-color: transparent;
}

button:active {
    background: #3a78b5;
}

.person {
    background: white;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
}

.person-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.person-head label {
    margin: 0;
    font-size: 16px;
    font-weight: bold;
    color: #333;
}

.remove-btn {
    width: auto !important;
    padding: 6px 12px !important;
    margin: 0 !important;
    font-size: 13px !important;
    background: #f0f0f0 !important;
    color: #c44848 !important;
    border: 1px solid #ddd !important;
    font-weight: normal !important;
}

.remove-btn:active {
    background: #e5e5e5 !important;
}

.secondary-btn {
    background: white;
    color: #4a90d9;
    border: 2px solid #4a90d9 !important;
    font-weight: bold;
}

.secondary-btn:active {
    background: #eaf2fb;
}

.secondary-btn:disabled {
    background: #f0f0f0;
    color: #999;
    border-color: #ccc !important;
}

#moreBtn {
    display: none;
}

.person input {
    margin: 6px 0;
}

.row {
    display: flex;
    gap: 8px;
}

.row input {
    flex: 1;
    min-width: 0;
}

.card {
    background: white;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    font-size: 17px;
    line-height: 1.7;
}

.card button {
    width: auto;
    padding: 8px 16px;
    font-size: 15px;
    margin-top: 8px;
    background: #e05c5c;
}

.card button:active {
    background: #c44848;
}

/* カレンダー色 */
.has-data {
    background: #90EE90 !important;
}

/* flatpickr 自体の文字も少し大きく */
.flatpickr-calendar {
    font-size: 16px !important;
    width: 100% !important;
    max-width: 480px;
}

.flatpickr-day {
    line-height: 44px !important;
    height: 44px !important;
}
</style>
</head>

<body>

<h2>行動記録</h2>

<label for="date">日付</label>
<input id="date" placeholder="日付を選択">

<h3>人物（最大10人）</h3>
<div id="people"></div>
<button type="button" id="addPersonBtn" class="secondary-btn" onclick="addPersonRow()">＋ 人を追加</button>

<h3>行き先</h3>
<input id="place" placeholder="行き先を入力" list="placeOptions">
<datalist id="placeOptions"></datalist>
<datalist id="nameOptions"></datalist>

<button onclick="add()">追加</button>
<button onclick="exportCSV()">CSVバックアップ</button>

<h3>一覧</h3>
<div id="list"></div>
<button type="button" id="moreBtn" class="secondary-btn" onclick="showMore()"></button>

<script>

// DB
let db;
let selectedDates = [];

let req = indexedDB.open("tripDB", 1);

req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
};

req.onsuccess = e => {
    db = e.target.result;
    load();
};

// カレンダー初期化（✅ズレ修正済）
const fp = flatpickr("#date", {
    dateFormat: "Y-m-d",
    onDayCreate: function(dObj, dStr, fp, dayElem) {

        let d = dayElem.dateObj;

        // ✅ ローカル時間で日付生成（ズレ防止）
        let dateStr = d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, '0') + "-" +
            String(d.getDate()).padStart(2, '0');

        if (selectedDates.includes(dateStr)) {
            dayElem.classList.add("has-data");
        }
    }
});

// 人物入力（最初は1人、ボタンで追加／削除）
const peopleDiv = document.getElementById("people");
const addPersonBtn = document.getElementById("addPersonBtn");
const MAX_PEOPLE = 10;
let personSeq = 0;

function createPersonRow() {
    personSeq++;
    const pid = personSeq;

    const div = document.createElement("div");
    div.className = "person";
    div.dataset.pid = pid;
    div.innerHTML = `
        <div class="person-head">
            <label></label>
            <button type="button" class="remove-btn" onclick="removePersonRow(${pid})">✕ 削除</button>
        </div>
        <input class="p-name" placeholder="名前" list="nameOptions">
        <div class="row">
            <div style="flex:1">
                <label>人数</label>
                <input class="p-count" type="number" value="1">
            </div>
            <div style="flex:1">
                <label>区分</label>
                <input class="p-kubun" placeholder="区分">
            </div>
        </div>`;

    peopleDiv.appendChild(div);
    renumberPeople();
    updateAddButtonState();
}

function addPersonRow() {
    if (peopleDiv.children.length >= MAX_PEOPLE) return;
    createPersonRow();
}

function removePersonRow(pid) {
    const el = peopleDiv.querySelector(`[data-pid="${pid}"]`);
    if (el) el.remove();
    renumberPeople();
    updateAddButtonState();
}

function renumberPeople() {
    [...peopleDiv.children].forEach((div, idx) => {
        div.querySelector(".person-head label").textContent = `${idx + 1}人目`;
    });
}

function updateAddButtonState() {
    if (peopleDiv.children.length >= MAX_PEOPLE) {
        addPersonBtn.disabled = true;
        addPersonBtn.textContent = "上限（10人）に達しました";
    } else {
        addPersonBtn.disabled = false;
        addPersonBtn.textContent = "＋ 人を追加";
    }
}

// 最初は1人分だけ表示
createPersonRow();

// 追加
function add() {
    let place = document.getElementById("place").value;
    let date = document.getElementById("date").value;

    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");

    document.querySelectorAll(".person").forEach(div => {
        let name = div.querySelector(".p-name").value;
        if (!name) return;

        let count = div.querySelector(".p-count").value || 1;
        let kubun = div.querySelector(".p-kubun").value || "その他";

        store.add({ date, name, count, kubun, place });
    });

    load();
}

// 表示＋カレンダー更新
let allRecords = [];
const LIST_PAGE_SIZE = 5;
let listLimit = LIST_PAGE_SIZE;

function load() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");

    let req = store.getAll();

    req.onsuccess = () => {
        let data = req.result;

        // ✅ 日付一覧更新
        selectedDates = [];
        data.forEach(r => {
            if (!selectedDates.includes(r.date)) {
                selectedDates.push(r.date);
            }
        });

        fp.redraw(); // カレンダー再描画

        allRecords = data.reverse(); // 新しい記録が先頭
        listLimit = LIST_PAGE_SIZE; // 再読み込み時は先頭からやり直す
        renderList();
        updateSuggestions(data);
    };
}

// 過去に入力した名前・行き先をプルダウン候補として表示
function updateSuggestions(data) {
    let names = [...new Set(data.map(r => r.name).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ja"));
    let places = [...new Set(data.map(r => r.place).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ja"));

    document.getElementById("nameOptions").innerHTML =
        names.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
    document.getElementById("placeOptions").innerHTML =
        places.map(p => `<option value="${escapeHtml(p)}"></option>`).join("");
}

function escapeHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
}

// 一覧を「直近◯件」だけ描画
function renderList() {
    let visible = allRecords.slice(0, listLimit);
    let html = "";

    visible.forEach(r => {
        html += `
        <div class="card">
            ${r.date}<br>
            ${r.name}（${r.count}人 / ${r.kubun}）<br>
            → ${r.place}<br>
            <button onclick="del(${r.id})">削除</button>
        </div>`;
    });

    if (allRecords.length === 0) {
        html = `<p style="text-align:center;color:#888;">まだ記録がありません</p>`;
    }

    document.getElementById("list").innerHTML = html;

    let moreBtn = document.getElementById("moreBtn");
    let remaining = allRecords.length - listLimit;

    if (remaining > 0) {
        moreBtn.style.display = "block";
        moreBtn.textContent = `もっと見る（残り${remaining}件）`;
    } else {
        moreBtn.style.display = "none";
    }
}

// もっと見るボタン
function showMore() {
    listLimit += LIST_PAGE_SIZE;
    renderList();
}

// 削除
function del(id) {
    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");
    store.delete(id);
    load();
}

// CSVバックアップ
function exportCSV() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");
    let req = store.getAll();

    req.onsuccess = () => {
        let data = req.result;

        let csv = "date,name,count,kubun,place\n";
        data.forEach(r => {
            csv += `${r.date},${r.name},${r.count},${r.kubun},${r.place}\n`;
        });

        let blob = new Blob([csv], { type: "text/csv" });
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "trip_log.csv";
        a.click();
    };
}

</script>

</body>
</html>
