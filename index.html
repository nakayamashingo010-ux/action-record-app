<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>行動記録</title>

<!-- カレンダー -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
* {
    box-sizing: border-box;
    -webkit-text-size-adjust: 100%;
}

body {
    font-family: -apple-system, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
    font-size: 17px;
    line-height: 1.5;
    padding: 14px;
    max-width: 480px;
    margin: 0 auto;
    background: #f5f5f5;
    color: #1a1a1a;
}

h2 {
    text-align: center;
    font-size: 24px;
    margin: 10px 0 18px;
}

h3 {
    font-size: 19px;
    margin: 20px 0 8px;
}

label {
    display: block;
    font-size: 15px;
    color: #555;
    margin: 2px 2px 0;
}

input, button {
    width: 100%;
    padding: 14px;
    margin: 6px 0;
    font-size: 17px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input::placeholder {
    color: #888;
}

button {
    background: #4a90d9;
    color: white;
    border: none;
    font-weight: bold;
    -webkit-tap-highlight-color: transparent;
}

button:active {
    background: #3a78b5;
}

.person {
    background: white;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
}

.person input {
    margin: 6px 0;
}

.row {
    display: flex;
    gap: 8px;
}

.row input {
    flex: 1;
    min-width: 0;
}

.card {
    background: white;
    padding: 14px;
    margin: 12px 0;
    border-radius: 10px;
    font-size: 17px;
    line-height: 1.7;
}

.card button {
    width: auto;
    padding: 8px 16px;
    font-size: 15px;
    margin-top: 8px;
    background: #e05c5c;
}

.card button:active {
    background: #c44848;
}

/* カレンダー色 */
.has-data {
    background: #90EE90 !important;
}

/* flatpickr 自体の文字も少し大きく */
.flatpickr-calendar {
    font-size: 16px !important;
    width: 100% !important;
    max-width: 480px;
}

.flatpickr-day {
    line-height: 44px !important;
    height: 44px !important;
}
</style>
</head>

<body>

<h2>行動記録</h2>

<label for="date">日付</label>
<input id="date" placeholder="日付を選択">

<h3>人物（最大10人）</h3>
<div id="people"></div>

<h3>行き先</h3>
<input id="place" placeholder="行き先を入力">

<button onclick="add()">追加</button>
<button onclick="exportCSV()">CSVバックアップ</button>

<h3>一覧</h3>
<div id="list"></div>

<script>

// DB
let db;
let selectedDates = [];

let req = indexedDB.open("tripDB", 1);

req.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
};

req.onsuccess = e => {
    db = e.target.result;
    load();
};

// カレンダー初期化（✅ズレ修正済）
const fp = flatpickr("#date", {
    dateFormat: "Y-m-d",
    onDayCreate: function(dObj, dStr, fp, dayElem) {

        let d = dayElem.dateObj;

        // ✅ ローカル時間で日付生成（ズレ防止）
        let dateStr = d.getFullYear() + "-" +
            String(d.getMonth() + 1).padStart(2, '0') + "-" +
            String(d.getDate()).padStart(2, '0');

        if (selectedDates.includes(dateStr)) {
            dayElem.classList.add("has-data");
        }
    }
});

// 10人入力
const peopleDiv = document.getElementById("people");

for (let i = 0; i < 10; i++) {
    peopleDiv.innerHTML += `
    <div class="person">
        <label>${i + 1}人目</label>
        <input placeholder="名前" id="name${i}">
        <div class="row">
            <div style="flex:1">
                <label>人数</label>
                <input type="number" id="count${i}" value="1">
            </div>
            <div style="flex:1">
                <label>区分</label>
                <input placeholder="区分" id="kubun${i}">
            </div>
        </div>
    </div>`;
}

// 追加
function add() {
    let place = document.getElementById("place").value;
    let date = document.getElementById("date").value;

    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");

    for (let i = 0; i < 10; i++) {
        let name = document.getElementById(`name${i}`).value;
        if (!name) continue;

        let count = document.getElementById(`count${i}`).value || 1;
        let kubun = document.getElementById(`kubun${i}`).value || "その他";

        store.add({ date, name, count, kubun, place });
    }

    load();
}

// 表示＋カレンダー更新
function load() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");

    let req = store.getAll();

    req.onsuccess = () => {
        let data = req.result;
        let html = "";

        // ✅ 日付一覧更新
        selectedDates = [];
        data.forEach(r => {
            if (!selectedDates.includes(r.date)) {
                selectedDates.push(r.date);
            }
        });

        fp.redraw(); // カレンダー再描画

        // 一覧表示
        data.reverse().forEach(r => {
            html += `
            <div class="card">
                ${r.date}<br>
                ${r.name}（${r.count}人 / ${r.kubun}）<br>
                → ${r.place}<br>
                <button onclick="del(${r.id})">削除</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = html;
    };
}

// 削除
function del(id) {
    let tx = db.transaction("records", "readwrite");
    let store = tx.objectStore("records");
    store.delete(id);
    load();
}

// CSVバックアップ
function exportCSV() {
    let tx = db.transaction("records", "readonly");
    let store = tx.objectStore("records");
    let req = store.getAll();

    req.onsuccess = () => {
        let data = req.result;

        let csv = "date,name,count,kubun,place\n";
        data.forEach(r => {
            csv += `${r.date},${r.name},${r.count},${r.kubun},${r.place}\n`;
        });

        let blob = new Blob([csv], { type: "text/csv" });
        let url = URL.createObjectURL(blob);

        let a = document.createElement("a");
        a.href = url;
        a.download = "trip_log.csv";
        a.click();
    };
}

</script>

</body>
</html>
